<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Ember &amp; Ash"/>
<meta name="theme-color" content="#F6EBDA"/>
<title>Ember &amp; Ash</title>

<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" href="icon-192.png"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,600&display=swap" rel="stylesheet">

<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #F6EBDA;
    -webkit-font-smoothing: antialiased;
    color: #2A1F17;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    overscroll-behavior-y: contain;
  }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* Safe-area padding so content respects notch/home-indicator when installed */
  #root {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- No __MOUNT_IN_FRAME — so main.jsx only exports App, doesn't mount -->
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="cigar-card.jsx"></script>
<script type="text/babel" src="flavor.jsx"></script>
<script type="text/babel" src="stats.jsx"></script>
<script type="text/babel" src="share-card.jsx"></script>
<script type="text/babel" src="review-sheet.jsx"></script>
<script type="text/babel" src="main.jsx"></script>
<script type="text/babel" src="root-standalone.jsx"></script>
</body>
</html>
